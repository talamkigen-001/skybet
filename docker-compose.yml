version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: norocjetx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-norocjetx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-norocjetx_secret}
      POSTGRES_DB: ${POSTGRES_DB:-norocjetx}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-norocjetx}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: norocjetx_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node.js + WebSocket) ───────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: norocjetx_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: postgres://${POSTGRES_USER:-norocjetx}:${POSTGRES_PASSWORD:-norocjetx_secret}@postgres:5432/${POSTGRES_DB:-norocjetx}
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Frontend (Vite / TanStack) ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: norocjetx_frontend
    restart: unless-stopped
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost/ws}
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Nginx (Reverse Proxy) ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: norocjetx_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro # Mount your SSL certificates here
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
