worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml
             application/xml application/xml+rss text/javascript;
  gzip_min_length 1024;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: ws: https://*.supabase.co;" always;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=ws:10m rate=5r/s;

  # Upstream definitions
  upstream backend {
    server backend:5001;
    keepalive 32;
  }

  upstream frontend {
    server frontend:3000;
    keepalive 16;
  }

  # ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── Main HTTPS server ─────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name _;   # Replace with your domain in production

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 5m;

    # ── WebSocket endpoint (/ws) ──────────────────────────────────────────────
    location /ws {
      limit_req zone=ws burst=10 nodelay;

      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;  # Keep WS connections alive up to 1 hour
      proxy_send_timeout 3600s;
    }

    # ── REST API endpoint (/api) ──────────────────────────────────────────────
    location /api {
      limit_req zone=api burst=40 nodelay;

      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
    }

    # ── Backend health check ──────────────────────────────────────────────────
    location /health {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      access_log off;
    }

    # ── Frontend (static SPA) ─────────────────────────────────────────────────
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # SPA fallback: send all unresolved paths to index.html
      proxy_intercept_errors on;
      error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
    }
  }
}
